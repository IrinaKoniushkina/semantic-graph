<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Визуальный код города</title>
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>

</head>

<body>
  <div id="graph"></div>
  <div id="info"></div>
  <div id="controls">
    <div class="top-bar">

      <!-- ПОИСК -->
      <div class="search-wrapper layer">
        <label>Поиск</label>
        <input type="text" id="search" placeholder="Поиск..." />
        <span id="clear-search">✕</span>
      </div>

      <!-- ФИЛЬТРЫ -->
      <div class="filter-dropdown">
        <div class="layer">
          <label>Слой</label>
          <div id="filter-toggle">Все</div>
        </div>

        <div id="filter-menu" class="dropdown-menu">
          <label>
            <input type="checkbox" value="all" checked>Все
          </label>
          <label>
            <input type="checkbox" value="culture"> Культура
          </label>
          <label>
            <input type="checkbox" value="youth"> Молодежь
          </label>
          <label>
            <input type="checkbox" value="tourism"> Туризм
          </label>
        </div>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
