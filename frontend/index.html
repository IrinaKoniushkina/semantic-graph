<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Визуальный код города</title>
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="icon" href="data:,">
</head>

<body>
  <div id="bg1" class="bg-layer"></div>
  <div id="bg2" class="bg-layer"></div>
  <div id="graph"></div>
  <div id="info"></div>
  <div id="controls">
    <div class="top-bar">

      <!-- ПОИСК -->
      <div class="search-wrapper layer">
        <label>Поиск</label>
        <input type="text" id="search" placeholder="Поиск..." />
        <span id="clear-search">✕</span>
      </div>

      <!-- ФИЛЬТРЫ -->
      <div class="filter-dropdown">
        <div class="layer">
          <label>Слой</label>
          <div id="filter-toggle">Все
            <span class="category-circle" style="background: linear-gradient(to right, #521C00, #A32406, #678690);"></span>
          </div>
        </div>

        <div id="filter-menu" class="dropdown-menu">
          <label>
            <input type="checkbox" value="all" checked>Все
            <span class="category-circle" style="background: linear-gradient(to right, #521C00, #A32406, #678690);"></span>
          </label>
          <label>
            <input type="checkbox" value="культура"> Культура
            <span class="category-circle" style="background: #521C00;"></span>
          </label>
          <label>
            <input type="checkbox" value="молодежь"> Молодежь
            <span class="category-circle" style="background: #A32406;"></span>
          </label>
          <label>
            <input type="checkbox" value="туризм"> Туризм
            <span class="category-circle" style="background: #678690;"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>

</html>
