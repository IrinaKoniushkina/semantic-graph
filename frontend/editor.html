<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Редактор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/editor.css">
</head>

<body>
  <div class="editor-box">
    <div class="admin-panel">
      <div class="admin-btn">
        <button id="tab-editor" class="mode-btn tab-btn active">
          <span>Граф</span>
        </button>
        <button id="tab-users" class="mode-btn tab-btn" style="display:none;">
          <span>Пользователи</span>
        </button>
        <button id="tab-history" class="mode-btn tab-btn" style="display:none;">
          <span>История</span>
        </button>
      </div>
    </div>
    <div class="topPanel">
      <h1 id="title">Новая вершина</h1>
      <div class="top-buttons">
        <button id="mode-add" class="mode-btn">
          <img src="icons/add.png">
        </button>
        <button id="mode-edit" class="mode-btn">
          <img style="width: 32px; height: 32px;" src="icons/pencil.png">
        </button>
        <button id="logout-btn" class="mode-btn">
          <img style="width: 32px; height: 32px;" src="icons/logout.png">
        </button>
      </div>
    </div>
    <form id="form">
      <!-- STEPS -->
      <div class="steps">
        <div class="step active" data-step="1">
          <div class="step-circle">1</div>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="2">
          <div class="step-circle">2</div>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="3">
          <div class="step-circle">3</div>
        </div>
      </div>

      <!-- STEP 1 -->
      <div class="form-step active" data-step="1">
        <div>
          <label>Название:</label>
          <div class="input-wrapper name-input-wrapper">
            <input id="name-input">
            <div class="counter" id="name-counter">0/30</div>
          </div>
          <div id="name-dropdown" class="dropdown"></div>
        </div>
        <div>
          <label>Выберите иконку:</label>
          <div class="icon-picker" id="icon-picker"> <svg class="icon active" data-icon="museum"
              xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 50 50">
              <path
                d="M9.27 19h3.916l.602 18H8.749zM6 38h38v2h3v3h2v2H1v-2h2v-3h3zm40-24.188L25.002 5L4 13.812V15h42zM8 16h34v2H8zm28.736 3h3.914l.607 18h-5.046zm-9.152 0h3.914l.6 18h-5.041zm-9.154 0h3.915l.596 18h-5.039z" />
            </svg> <svg class="icon" data-icon="church" xmlns="http://www.w3.org/2000/svg" width="35" height="35"
              viewBox="0 0 24 24">
              <path
                d="M10 22v-4a2 2 0 0 1 4 0v4h4V12a1 1 0 0 0-.485-.857L13 8.434V6h2V4h-2V2h-2v2H9v2h2v2.434l-4.515 2.709A1 1 0 0 0 6 12v10h4zm-7 0h2v-8.118l-2.447 1.224A.998.998 0 0 0 2 16v5a1 1 0 0 0 1 1zm18.447-6.895L19 13.882V22h2a1 1 0 0 0 1-1v-5c0-.379-.214-.725-.553-.895z" />
            </svg> <svg class="icon" data-icon="monument" xmlns="http://www.w3.org/2000/svg" width="35" height="35"
              viewBox="0 0 24 24">
              <path
                d="M12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />
              <path
                d="M16 5.236V17h1.75c.69 0 1.25.56 1.25 1.25V20h1a1 1 0 1 1 0 2H4a1 1 0 1 1 0-2h1v-1.75c0-.69.56-1.25 1.25-1.25H8V5.236L7.112 3.46a1.01 1.01 0 0 1 .778-1.454l3.955-.494a1.3 1.3 0 0 1 .31 0l3.955.494c.692.086 1.09.83.778 1.454z" />
            </svg> <svg class="icon" data-icon="park" xmlns="http://www.w3.org/2000/svg" width="35" height="35"
              viewBox="0 0 12 12">
              <path
                d="M11 3.75A1.75 1.75 0 0 0 9.25 2a1.73 1.73 0 0 0-.8.2A1.24 1.24 0 0 0 7.21 1a1.19 1.19 0 0 0-.21.05A1.23 1.23 0 0 0 5.75 0a1.25 1.25 0 0 0-1.13.73A1.21 1.21 0 0 0 4 .52a1.23 1.23 0 0 0-1 .55A1.491 1.491 0 0 0 2.51 1a1.51 1.51 0 0 0-1.4 2.08A1.49 1.49 0 0 0 1.08 6a1.49 1.49 0 0 0 2.55.52h.12c.321 0 .63-.126.86-.35V10L3 11h5l-1.6-1V9a8.42 8.42 0 0 1 2.38-2c.26-.05.5-.167.7-.34A1.49 1.49 0 0 0 10 5.5a1.46 1.46 0 0 0 0-.17c.61-.29 1-.904 1-1.58zm-4.64 4.5V6h.18a1.52 1.52 0 0 0 .53-.1a1.5 1.5 0 0 0 .89 1a8.821 8.821 0 0 0-1.6 1.35z" />
            </svg> <svg class="icon" data-icon="building" xmlns="http://www.w3.org/2000/svg" width="35" height="35"
              viewBox="0 0 24 24">
              <path
                d="M15 11V5.83c0-.53-.21-1.04-.59-1.41L12.7 2.71a.996.996 0 0 0-1.41 0l-1.7 1.7C9.21 4.79 9 5.3 9 5.83V7H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2zm-8 8H5v-2h2zm0-4H5v-2h2zm0-4H5V9h2zm6 8h-2v-2h2zm0-4h-2v-2h2zm0-4h-2V9h2zm0-4h-2V5h2zm6 12h-2v-2h2zm0-4h-2v-2h2z" />
            </svg> <svg class="icon" data-icon="user" xmlns="http://www.w3.org/2000/svg" width="40" height="40"
              viewBox="0 0 24 22">
              <path
                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4s-4 1.79-4 4s1.79 4 4 4m0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4" />
            </svg>
          </div>
        </div>
        <div>
          <label>Выберите категорию:</label>
          <div class="multi-select" id="category-select">
            <input type="text" id="category-input" autocomplete="off">
            <div class="dropdown" id="category-dropdown"></div>
            <div class="selected-items" id="selected-categories"></div>
          </div>
        </div>
        <div>
          <label>Добавьте код для Яндекс.Карт</label>
          <div class="input-wrapper">
            <input id="geo-input">
          </div>
        </div>
        <div class="step-buttons step-buttons-first">
          <button type="button" id="delete-btn" class="delete-btn">
            Удалить
          </button>
          <button type="button" class="wizard-btn secondary reset-step">
            Сбросить
          </button>
          <button type="button" class="wizard-btn next-step" id="step1-next" disabled>
            Далее
          </button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="form-step" data-step="2">
        <div>
          <label>Выберите связи</label>
          <div class="choise-type-relations">
            <input type="radio" id="geo-relation" name="type-relations" value="geo-relation" checked>
            <label for="geo-relation" style="margin-right: 15px;">
              Географическая
            </label>
            <input type="radio" id="history-relation" name="type-relations" value="history-relation" />
            <label for="history-relation">
              Культурно-историческая
            </label>
          </div>
          <input id="relation-search">
          <div id="relation-dropdown" class="dropdown"></div>
          <div id="selected-relations"></div>
          <div id="relation-reason-editor" class="relation-reason-editor hidden">
            <div class="relation-reason-title">
              Причина взаимосвязи
            </div>
            <div class="input-wrapper">
              <textarea id="relation-reason-input" maxlength="150"
                placeholder="Опишите взаимосвязь объектов"></textarea>
              <div class="counter" id="relation-reason-counter">0/150</div>
            </div>
            <div class="relation-reason-buttons">
              <button type="button" id="save-relation-reason" class="submit small-btn">
                Сохранить
              </button>
              <button type="button" id="cancel-relation-reason" class="delete-btn small-delete">
                Отменить
              </button>
            </div>
          </div>
          <div>
            <label>Создайте таймлайн с изображениями</label>
            <div class="upload-grid">
              <div class="upload-box" id="uploadBox">
                <img src="icons/image.png" class="upload-icon">
              </div>
              <input type="file" id="images-input" multiple accept="image/*" style="display:none;">
              <div id="image-preview"></div>
            </div>
          </div>
        </div>
        <div class="step-buttons">
          <button type="button" class="wizard-btn secondary prev-step">
            Назад
          </button>
          <button type="button" class="wizard-btn secondary reset-step">
            Сбросить
          </button>
          <button type="button" class="wizard-btn next-step" id="step2-next" disabled>
            Далее
          </button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="form-step" data-step="3">
        <div>
          <label>Ключевые слова</label>
          <div class="input-wrapper">
            <textarea id="keywords-input"></textarea>
            <div class="counter" id="keywords-counter">0/150</div>
          </div>
        </div>
        <div>
          <label>Добавьте описание</label>
          <div class="tabs editor-tabs">
            <button type="button" class="tab active" data-tab="desc">
              Описание
            </button>
            <button type="button" class="tab" data-tab="history">
              История
            </button>
            <button type="button" class="tab" data-tab="modern">
              Наши дни
            </button>
          </div>
          <div class="tab-content">
            <!-- DESC -->
            <div class="tab-pane active input-wrapper" id="desc">
              <div class="editor-wrapper">
                <div class="editor-toolbar">
                  <button type="button" data-cmd="bold"><b>B</b></button>
                  <button type="button" data-cmd="italic"><i>I</i></button>
                  <button type="button" data-cmd="underline"><u>U</u></button>
                </div>
                <div id="desc-input" class="editor" contenteditable="true"></div>
              </div>
              <div class="counter" id="desc-counter">0/500</div>
            </div>
            <!-- HISTORY -->
            <div class="tab-pane input-wrapper" id="history">
              <div class="editor-wrapper">
                <div class="editor-toolbar">
                  <button type="button" data-cmd="bold"><b>B</b></button>
                  <button type="button" data-cmd="italic"><i>I</i></button>
                  <button type="button" data-cmd="underline"><u>U</u></button>
                </div>
                <div id="history-input" class="editor" contenteditable="true"></div>
              </div>
              <div class="counter" id="history-counter">0/1500</div>
            </div>
            <!-- MODERN -->
            <div class="tab-pane input-wrapper" id="modern">
              <div class="editor-wrapper">
                <div class="editor-toolbar">
                  <button type="button" data-cmd="bold"><b>B</b></button>
                  <button type="button" data-cmd="italic"><i>I</i></button>
                  <button type="button" data-cmd="underline"><u>U</u></button>
                </div>
                <div id="modern-input" class="editor" contenteditable="true"></div>
              </div>
              <div class="counter" id="modern-counter">0/1500</div>
            </div>
          </div>
        </div>
        <div class="step-buttons">
          <button type="button" class="wizard-btn secondary prev-step">
            Назад
          </button>
          <button type="button" class="wizard-btn secondary reset-step">
            Сбросить
          </button>
          <button id="save-btn" class="wizard-btn submit" disabled>
            Добавить вершину
          </button>
        </div>
      </div>
    </form>
    <!-- USERS PANEL -->
    <div id="users-panel" class="admin-content" style="display:none;">
      <div class="admin-section">
        <h2 class="admin-title">Пользователи</h2>

        <div class="users-header">
          <button id="open-create-user" class="wizard-btn submit">
            Добавить пользователя
          </button>
        </div>

        <div id="users-list" class="users-list"></div>
      </div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="history-panel" class="admin-content" style="display:none;">
      <div class="admin-section">
        <h2 class="admin-title">История изменений</h2>

        <div id="history-list" class="history-list"></div>
      </div>
    </div>

    <!-- CREATE USER MODAL -->
    <div id="createUserModal" class="modal">
      <div class="modal-content">
        <span class="modal-close" id="closeCreateUserModal">✕</span>

        <p class="modal-text">Новый пользователь</p>

        <div class="admin-form">
          <input type="text" id="new-user-login" placeholder="Логин">

          <input type="password" id="new-user-password" placeholder="Пароль">

          <select id="new-user-role">
            <option value="editor">Редактор</option>
            <option value="admin">Администратор</option>
          </select>

          <button id="create-user-btn" class="wizard-btn submit">
            Создать
          </button>
        </div>
      </div>
    </div>
  </div>
  <!--Всплывающие окна-->
  <div id="toast" class="toast">Сохранено</div>
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">✕</span>
      <p class="modal-text">Удалить эту вершину?</p>

      <div class="modal-buttons">
        <button id="deleteYes" class="btn-yes">Да</button>
        <button id="deleteNo" class="btn-no">Нет</button>
      </div>
    </div>
  </div>
  <div id="resetModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="resetModalClose">✕</span>
      <p class="modal-text">
        Вы действительно хотите<br>сбросить изменения?
      </p>
      <div class="modal-buttons">
        <button id="resetYes" class="btn-yes">
          Да
        </button>
        <button id="resetNo" class="btn-no">
          Нет
        </button>
      </div>
    </div>
  </div>
  <div id="deleteRelationModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="relationModalClose">✕</span>

      <p class="modal-text">Удалить связь?</p>

      <div class="modal-buttons">
        <button id="relationDeleteYes" class="btn-yes">
          Да
        </button>

        <button id="relationDeleteNo" class="btn-no">
          Нет
        </button>
      </div>
    </div>
  </div>

  <!-- ВАЖНО: отдельно -->
  <div id="imageModal" class="image-modal">
    <div class="image-modal-content">
      <div class="modal-preview-wrapper" id="modalPreviewWrapper">
        <div class="modal-option" id="uploadFromDevice">
          <img src="icons/image.png" class="modal-icon">
          <div>Загрузить с устройства</div>
        </div>
        <div class="modal-image-box" id="modalImageBox">
          <img id="modalPreviewImage" class="modal-preview-image">

          <div class="modal-image-remove" id="removeModalPreview">✕</div>
        </div>
      </div>
      <div class="modal-divider">или</div>
      <input id="imageUrlInput" placeholder="URL на изображение">
      <label class="license-toggle">
        <input type="checkbox" id="imageCreditsToggle">
        Лицензия / авторство
      </label>
      <div id="imageCreditsFields" style="display:none;">
        <input type="text" id="imageAuthorInput" placeholder="Автор">
        <input type="text" id="imageSourceInput" placeholder="Ссылка на источник">
        <input type="text" id="imageLicenseInput" placeholder="Лицензия (например CC BY-SA 4.0)">
      </div>
      <label class="caption-label">Подпись</label>
      <input id="imageCaptionInput" placeholder="Введите подпись"></input>
      <button id="addUrlBtn">Добавить</button>
      <div class="modal-close" id="closeImageModal">✕</div>
    </div>
  </div>
  <script src="js/editor.js"></script>
</body>

</html>
