<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Редактор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/editor.css">
</head>

<body>
  <div class="editor-box">
    <div class="topPanel">
      <h2 id="title">Новая вершина</h2>
      <div class="top-buttons">
        <button id="mode-add" class="mode-btn">
          <img src="icons/add.png">
        </button>
        <button id="mode-edit" class="mode-btn">
          <img style="width: 32px; height: 32px;" src="icons/pencil.png">
        </button>
        <button id="logout-btn" class="mode-btn">
          <img style="width: 32px; height: 32px;" src="icons/logout.png">
        </button>
      </div>
    </div>
    <form id="form">
      <div class="conteiner">
        <div class="block1">
          <label>Название</label>
          <input id="name-input">
          <div id="name-dropdown" class="dropdown"></div>
          <label>Выберите иконку</label>

          <div class="icon-picker" id="icon-picker">
            <img src="icons/parthenon.png" data-icon="icons/parthenon.png">
            <img src="icons/church.png" data-icon="icons/church.png">
            <img src="icons/monument.png" data-icon="icons/monument.png">
            <img src="icons/nature.png" data-icon="icons/nature.png">
            <img src="icons/buildings.png" data-icon="icons/buildings.png">
            <img src="icons/user.png" data-icon="icons/user.png">
          </div>

          <label>Выберете слой</label>
          <div class="multi-select" id="category-select">
            <input type="text" id="category-input" autocomplete="off">
            <div class="dropdown" id="category-dropdown"></div>
            <div class="selected-items" id="selected-categories"></div>
          </div>
          <label>Выберете связи</label>
          <input id="relation-search">
          <div id="relation-dropdown" class="dropdown"></div>
          <div id="selected-relations"></div>

          <label>Добавьте изображения</label>
          <div class="upload-grid">
            <label for="images-input" class="upload-box">
              <img src="icons/image.png" class="upload-icon">
            </label>
            <input type="file" id="images-input" multiple accept="image/*">
            <div id="image-preview"></div>
          </div>

      <div id="image-preview"></div>
        </div>
        <div class="block2">
          <label>Добавьте описание</label>
          <textarea id="desc-input"></textarea>
        </div>  
      </div>
      <div class="form-buttons">
        <button id="save-btn" class="submit">Добавить вершину в граф</button>
        <button id="delete-btn" class="delete-btn" type="button">Удалить</button>
      </div>
    </form>
    
  </div>

  <div id="toast" class="toast">Сохранено</div>

  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">✕</span>
      <p class="modal-text">Удалить эту вершину?</p>
      <div class="modal-buttons">
        <button id="deleteYes" class="btn-yes">Да</button>
        <button id="deleteNo" class="btn-no">Нет</button>
      </div>
    </div>
  </div>
  <script src="editor.js"></script>
</body>

</html>
